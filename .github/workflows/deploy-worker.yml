name: Deploy Worker

# main への push で自動デプロイ。CI workflow (typecheck + test) が通った場合のみ走る。
# Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets to enable auto-deploy.
on:
  workflow_dispatch:
  # CI が成功した時だけデプロイする (main への push 時の CI が通ると起動)
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # CI が成功していない場合はデプロイしない (workflow_dispatch での手動起動時は常に走る)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build

      - run: pnpm --filter worker build
        env:
          VITE_LIFF_ID: ${{ vars.VITE_LIFF_ID }}
          VITE_BOT_BASIC_ID: ${{ vars.VITE_BOT_BASIC_ID }}
          VITE_CALENDAR_CONNECTION_ID: ${{ vars.VITE_CALENDAR_CONNECTION_ID }}

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy

      - name: Notify deploy result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice title=Worker deployed::Successfully deployed to Cloudflare Workers"
          else
            echo "::error title=Deploy failed::Worker deployment failed — investigate the log above"
          fi
