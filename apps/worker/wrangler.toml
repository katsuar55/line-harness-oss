name = "naturism-line-crm"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# Workers AI binding
[ai]
binding = "AI"

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "naturism-line-crm"
database_id = "f736c7fa-1c19-4279-b03d-3af3a71b7fca"

# R2 is disabled — enable in Cloudflare Dashboard first, then uncomment:
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "naturism-line-crm-images"

[triggers]
crons = ["*/5 * * * *"]

[vars]
ACCOUNT_NAME = "naturism"
AI_MODEL_PRIMARY = "@cf/qwen/qwen3-30b-a3b-fp8"
AI_MODEL_FALLBACK = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
# AI_SYSTEM_PROMPT is set via: npx wrangler secret put AI_SYSTEM_PROMPT
